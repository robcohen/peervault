name: Release peervaultd

# Builds prebuilt daemon binaries when a daemon tag is pushed
# (e.g. `git tag peervaultd-v0.1.0 && git push --tags`).
on:
  push:
    tags:
      - "peervaultd-v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p peervaultd
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf peervaultd-${{ matrix.target }}.tar.gz peervaultd
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/peervaultd-${{ matrix.target }}.tar.gz
