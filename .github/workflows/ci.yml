name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust core (test + WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v22
      # Magic Nix Cache (hosted) was sunset in 2025. To re-enable cross-run
      # caching, add `permissions: id-token: write` and
      # `DeterminateSystems/flakehub-cache-action@main` here.

      - name: cargo test (native)
        # test-utils exposes MockHost for the integration test crates.
        # Network-dependent tests are #[ignore]d (need a real relay).
        run: nix develop --command bash -c 'cd peervault-core && cargo test --features test-utils'

      - name: Build WASM
        run: |
          nix develop --command bash -c '
            cd peervault-core &&
            cargo build --target wasm32-unknown-unknown --features wasm --no-default-features --release'

      - name: Verify WASM has no native ("env") imports
        run: |
          nix develop --command bash -c '
            count=$(wasm-tools print target/wasm32-unknown-unknown/release/peervault_core.wasm | grep -c "\"env\"" || true);
            echo "env imports: $count";
            test "$count" -eq 0'

  typescript:
    name: TypeScript plugin (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@v22
      # Magic Nix Cache (hosted) was sunset in 2025. To re-enable cross-run
      # caching, add `permissions: id-token: write` and
      # `DeterminateSystems/flakehub-cache-action@main` here.

      - name: Install deps and typecheck
        run: nix develop --command bash -c 'bun install && bun run check'

      - name: peervaultd build
        run: nix develop --command bash -c 'cd hosts/peervaultd && cargo build'

      - name: VSCode host typecheck
        run: nix develop --command bash -c 'cd hosts/vscode && bun install && bun run check'
